services:
  mongodb:
    image: mongo:latest
    container_name: meu-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: meu-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_SERVER: mongodb
    depends_on:
      - mongodb

  redis:
    image: redis:latest
    container_name: meu-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  redisinsight:
    image: redis/redisinsight:latest
    container_name: meu-redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis

  catalog-api:
    image: catalog-api:latest
    container_name: catalog-api
    build:
      context: .
      dockerfile: Catalog.API/Dockerfile
    ports:
      - "5001:8080" # Mantém a porta 5001 para fora do Docker externa se quiser acessar direto
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Endpoints__Http__Url=http://*:8080 # Sobrescreve o Kestrel para ouvir na porta do container
      - ConnectionStrings__MongoDb=mongodb://admin:password@mongodb:27017
      - PricingServiceUrl=http://pricing-api:8080
    depends_on:
      - mongodb
      - redis

  pricing-api:
    image: pricing-api:latest
    container_name: pricing-api
    build:
      context: .
      dockerfile: Pricing.API/Dockerfile
    ports:
      - "5002:8080" # Mantém a porta 5002 para fora do Docker externa
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Endpoints__Http__Url=http://*:8080 # Sobrescreve o Kestrel para ouvir na porta do container
      - ConnectionStrings__Redis=redis:6379
    depends_on:
      - redis

volumes:
  mongo-data:
  redis-data:
